name: python applications

on:
    push:
        branches : ["main"]
    pull_request:
        branches : ["Main"]

jobs :
    build:
        runs-on: ubantu-latest
        
        steps:
            - name: checkout code
              uses : actions/checkout@y3
            
            - name : set up Python
              uses : actions/python@v4
              with :
                python-version: "3.10"
            - name : Install dependencies
              run : |
                pip install -r requirments.txt
            
            - name : Run tests
              run:
                pytest
    
